<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criticality Portal</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="logo-container">
        <h1 class="logo-text">Criticality</h1>
    </div>

    <div class="main-layout">
        <div class="card">
            <h2>Sign Up</h2>
            <p class="subtitle">Create a free account to start playing and building</p>
            <form id="signup-form">
                <div class="input-group">
                    <label>Birthday</label>
                    <div class="birthday-row">
                        <select id="birth-month" required>
                            <option value="" disabled selected>Month</option>
                            <option value="01">January</option>
                            <option value="02">February</option>
                            <option value="03">March</option>
                            <option value="04">April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                            <option value="07">July</option>
                            <option value="08">August</option>
                            <option value="09">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                        <select id="birth-day" required>
                            <option value="" disabled selected>Day</option>
                            <script>
                                for(let i=1; i<=31; i++) {
                                    document.write(`<option value="${i.toString().padStart(2, '0')}">${i}</option>`);
                                }
                            </script>
                        </select>
                        <select id="birth-year" required>
                            <option value="" disabled selected>Year</option>
                            <script>
                                const currentYear = new Date().getFullYear();
                                for(let i=currentYear; i>=1900; i--) {
                                    document.write(`<option value="${i}">${i}</option>`);
                                }
                            </script>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" placeholder="Don't use your real name" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="At least 4 characters" required autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Type password again" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-signup">Sign Up</button>
            </form>
            <div id="signup-message" class="message"></div>
        </div>

        <div class="card">
            <h2>Sign In</h2>
            <p class="subtitle">Log in with your existing account</p>
            <form id="signin-form">
                <div class="input-group">
                    <label for="signin-username">Username</label>
                    <input type="text" id="signin-username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-signin">Sign In</button>
            </form>
            <div id="signin-message" class="message"></div>
        </div>
    </div>

    <div id="email-modal" class="modal">
        <div class="modal-content">
            <h3>Email Verification Needed</h3>
            <p>Please enter your email address to secure your account credentials.</p>
            <form id="email-form">
                <input type="email" id="user-email" placeholder="Enter your email address" required>
                <button type="submit">Verify Email</button>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <p>Website Name: <strong>Criticality</strong> | URL: <a href="https://criticality.onrender.com" target="_blank">https://criticality.onrender.com</a></p>
    </footer>

    <script>
        const signupForm = document.getElementById('signup-form');
        const signinForm = document.getElementById('signin-form');
        const signupMessage = document.getElementById('signup-message');
        const signinMessage = document.getElementById('signin-message');
        const emailModal = document.getElementById('email-modal');
        const emailForm = document.getElementById('email-form');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            signupMessage.className = 'message';
            
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password.length < 4) {
                signupMessage.textContent = 'Password must be at least 4 characters long';
                signupMessage.classList.add('error');
                return;
            }

            if (password !== confirm) {
                signupMessage.textContent = 'Passwords do not match';
                signupMessage.classList.add('error');
                return;
            }

            const birthday = `${document.getElementById('birth-year').value}-${document.getElementById('birth-month').value}-${document.getElementById('birth-day').value}`;

            const payload = {
                username: document.getElementById('signup-username').value,
                password,
                birthday
            };

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    signupForm.reset();
                    emailModal.style.display = 'flex';
                } else {
                    signupMessage.textContent = data.message;
                    signupMessage.classList.add('error');
                }
            } catch (err) {
                signupMessage.textContent = 'Cannot connect to server';
                signupMessage.classList.add('error');
            }
        });

        signinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            signinMessage.className = 'message';

            const payload = {
                username: document.getElementById('signin-username').value,
                password: document.getElementById('signin-password').value
            };

            try {
                const response = await fetch('/api/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    signinForm.reset();
                    emailModal.style.display = 'flex';
                } else {
                    signinMessage.textContent = data.message;
                    signinMessage.classList.add('error');
                }
            } catch (err) {
                signinMessage.textContent = 'Cannot connect to server';
                signinMessage.classList.add('error');
            }
        });

        emailForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Verification sequence updated successfully!');
            emailModal.style.display = 'none';
            emailForm.reset();
        });
    </script>
</body>
</html>
