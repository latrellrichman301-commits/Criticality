<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criticality</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1e293b;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0056b3, #002d62);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo {
            color: #ffffff;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 2px 3px 0px rgba(0,0,0,0.15);
        }

        .header-status {
            color: #ffb703;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .main-container {
            max-width: 1040px;
            width: 100%;
            margin: auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        .auth-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.07);
        }

        .card-header {
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .card-header h2 {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
        }

        .card-header p {
            font-size: 14px;
            color: #64748b;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            background-color: #f8fafc;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: #0056b3;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.15);
        }

        .birthday-group {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-signup {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-signup:hover {
            background: linear-gradient(135deg, #34d399, #059669);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -2px rgba(16, 185, 129, 0.3);
        }

        .btn-signin {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        .btn-signin:hover {
            background: linear-gradient(135deg, #60a5fa, #1d4ed8);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -2px rgba(59, 130, 246, 0.3);
        }

        .btn:active {
            transform: translateY(1px);
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #64748b;
            font-size: 13px;
            margin-top: auto;
            border-top: 1px solid #e2e8f0;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Criticality</div>
        <div class="header-status">Powering Imagination</div>
    </header>

    <main class="main-container">
        
        <section class="auth-card">
            <div class="card-header">
                <h2>Create Account</h2>
                <p>Join the community and start building</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Birthday</label>
                    <div class="birthday-group">
                        <select name="month" required>
                            <option value="">Month</option>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                        <select name="day" required>
                            <option value="">Day</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                        <select name="year" required>
                            <option value="">Year</option>
                            <option value="2012">2012</option>
                            <option value="2011">2011</option>
                            <option value="2010">2010</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" placeholder="Choose a unique name" minlength="3" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" placeholder="Minimum 4 characters" minlength="4" required>
                </div>

                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" name="confirm_password" placeholder="Repeat your password" required>
                </div>

                <button type="submit" class="btn btn-signup">Sign Up</button>
            </form>
        </section>

        <section class="auth-card">
            <div class="card-header">
                <h2>User Login</h2>
                <p>Access your profile and digital workshop</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-signin">Sign In</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Criticality Corporation. All rights reserved.</p>
    </footer>

</body>
</html>
