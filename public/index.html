<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criticality Portal</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div id="auth-box" class="card">
            <h2 id="form-title">Sign In</h2>
            <form id="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <div class="input-group id-signup" style="display: none;">
                    <label for="birthday">Birthday</label>
                    <input type="date" id="birthday">
                </div>
                <button type="submit" id="submit-btn">Login</button>
            </form>
            <p id="toggle-text">Don't have an account? <a href="#" id="toggle-link">Sign Up</a></p>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script>
        const authForm = document.getElementById('auth-form');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleLink = document.getElementById('toggle-link');
        const toggleText = document.getElementById('toggle-text');
        const signupFields = document.querySelectorAll('.id-signup');
        const birthdayInput = document.getElementById('birthday');
        const messageDiv = document.getElementById('message');

        let isSignUp = false;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUp = !isSignUp;
            messageDiv.textContent = '';
            messageDiv.className = 'message';

            if (isSignUp) {
                formTitle.textContent = 'Sign Up';
                submitBtn.textContent = 'Register';
                toggleText.innerHTML = 'Already have an account? <a href="#" id="toggle-link">Sign In</a>';
                signupFields.forEach(f => f.style.display = 'block');
                birthdayInput.required = true;
            } else {
                formTitle.textContent = 'Sign In';
                submitBtn.textContent = 'Login';
                toggleText.innerHTML = 'Don\'t have an account? <a href="#" id="toggle-link">Sign Up</a>';
                signupFields.forEach(f => f.style.display = 'none');
                birthdayInput.required = false;
            }
            
            document.getElementById('toggle-link').addEventListener('click', arguments.callee);
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';
            messageDiv.className = 'message';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const endpoint = isSignUp ? '/api/signup' : '/api/signin';
            const payload = { username, password };

            if (isSignUp) {
                payload.birthday = birthdayInput.value;
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = data.message;
                    messageDiv.classList.add('success');
                    if (!isSignUp && data.token) {
                        localStorage.setItem('token', data.token);
                    }
                    authForm.reset();
                } else {
                    messageDiv.textContent = data.message || 'An error occurred';
                    messageDiv.classList.add('error');
                }
            } catch (err) {
                messageDiv.textContent = 'Cannot connect to server';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
