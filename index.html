<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criticality</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #EFEFEF;
            color: #3F4143;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #001A35;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #001122;
        }

        .logo {
            color: #FFFFFF;
            font-size: 34px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .header-status {
            color: #FFA500;
            font-weight: bold;
            font-size: 14px;
        }

        .main-container {
            max-width: 900px;
            width: 100%;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                margin: 20px auto;
            }
        }

        .auth-card {
            background-color: #FFFFFF;
            border: 1px solid #BDC3C7;
            border-radius: 8px;
            padding: 30px;
        }

        .card-header {
            margin-bottom: 25px;
        }

        .card-header h2 {
            font-size: 26px;
            font-weight: bold;
            color: #111111;
            letter-spacing: -0.5px;
        }

        .card-header p {
            font-size: 13px;
            color: #666666;
            margin-top: 3px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333333;
            font-size: 13px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #A4A9AD;
            border-radius: 6px;
            background-color: #F8F9FA;
            font-size: 14px;
            color: #000000;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: #0055A5;
            background-color: #FFFFFF;
        }

        .birthday-group {
            display: grid;
            grid-template-columns: 1.3fr 1fr 1fr;
            gap: 8px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #FFFFFF;
            text-align: center;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-signup {
            background-color: #02B702;
            border-bottom: 3px solid #018401;
        }

        .btn-signup:hover {
            background-color: #02D102;
        }

        .btn-signin {
            background-color: #0077E6;
            border-bottom: 3px solid #0055A5;
        }

        .btn-signin:hover {
            background-color: #1A88FF;
        }

        .btn:active {
            border-bottom: none;
            margin-top: 3px;
            padding-bottom: 9px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #555555;
            font-size: 12px;
            margin-top: auto;
            border-top: 1px solid #D6D6D6;
            background-color: #E8E8E8;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Criticality</div>
        <div class="header-status">ONLINE USER PORTAL</div>
    </header>

    <main class="main-container">
        
        <section class="auth-card">
            <div class="card-header">
                <h2>Sign Up</h2>
                <p>Create a free account to start playing and building</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Birthday</label>
                    <div class="birthday-group">
                        <select name="month" required>
                            <option value="">Month</option>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                        <select name="day" required>
                            <option value="">Day</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                        <select name="year" required>
                            <option value="">Year</option>
                            <option value="2012">2012</option>
                            <option value="2011">2011</option>
                            <option value="2010">2010</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" placeholder="Don't use your real name" minlength="3" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" placeholder="At least 4 characters" minlength="4" required>
                </div>

                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" name="confirm_password" placeholder="Type password again" required>
                </div>

                <button type="submit" class="btn btn-signup">Sign Up</button>
            </form>
        </section>

        <section class="auth-card">
            <div class="card-header">
                <h2>Sign In</h2>
                <p>Log in with your existing account</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required>
                </div>

                <button type="submit" class="btn btn-signin">Sign In</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Criticality. All rights reserved.</p>
    </footer>

</body>
</html>
